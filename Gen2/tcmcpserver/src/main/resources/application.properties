# ==============================================================================
# Teamcenter MCP Server - Application Configuration
# ==============================================================================

# --- Server ---
server.port=8080

# --- MCP Server Configuration ---
spring.ai.mcp.server.name=teamcenter-mcp-server
spring.ai.mcp.server.version=1.0.0

# Transport: STREAMABLE replaces deprecated SSE.
# Copilot Studio requires Streamable HTTP (SSE deprecated after Aug 2025).
spring.ai.mcp.server.protocol=STREAMABLE

# Server type: SYNC for blocking SOA calls to Teamcenter
spring.ai.mcp.server.type=SYNC

# MCP instructions - tells the LLM what this server does
spring.ai.mcp.server.instructions=This MCP server provides access to Siemens Teamcenter PLM. \
  You can search for Items, execute saved queries, and retrieve PLM object details. \
  Use tc_search_items for keyword searches, tc_list_saved_queries to discover available \
  queries, and tc_execute_saved_query to run a specific query with criteria.

# Capabilities
spring.ai.mcp.server.capabilities.tool=true
spring.ai.mcp.server.capabilities.resource=false
spring.ai.mcp.server.capabilities.prompt=false

# Streamable HTTP endpoint (default is /mcp)
spring.ai.mcp.server.streamable-http.mcp-endpoint=/mcp

# --- Teamcenter Connection ---
teamcenter.server-url=${TC_SERVER_URL:https://localhost:7001/tc}
teamcenter.username=${TC_USERNAME:infodba}
teamcenter.password=${TC_PASSWORD:infodba}

# --- Actuator (health checks for deployment) ---
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always

# --- Logging ---
logging.level.com.example.teamcenter=DEBUG
logging.level.org.springframework.ai.mcp=DEBUG

# No web server - this is a CLI application
spring.main.web-application-type=none
spring.main.banner-mode=off

# Default MCP server URL (can be overridden via command line or env var)
mcp.server.url=${MCP_SERVER_URL:http://localhost:8080}

# Logging
logging.level.root=WARN
logging.level.com.knorr.teamcenter=INFO
logging.level.io.modelcontextprotocol=DEBUG

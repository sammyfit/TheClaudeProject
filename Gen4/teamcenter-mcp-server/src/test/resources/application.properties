# ==============================================================================
# Test Configuration
# ==============================================================================

# MCP Server
spring.ai.mcp.server.name=teamcenter-mcp-server-test
spring.ai.mcp.server.version=1.0.0-TEST
spring.ai.mcp.server.protocol=STREAMABLE
spring.ai.mcp.server.type=SYNC
spring.ai.mcp.server.capabilities.tool=true

# Streamable HTTP
spring.ai.mcp.server.streamable-http.mcp-endpoint=/mcp

# Teamcenter (stub - no real TC connection during tests)
teamcenter.server-url=https://localhost:7001/tc
teamcenter.username=test_user
teamcenter.password=test_pass

# Logging
logging.level.com.knorr.teamcenter=DEBUG
logging.level.org.springframework.ai.mcp=DEBUG
